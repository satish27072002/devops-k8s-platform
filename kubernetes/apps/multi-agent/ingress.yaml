apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multi-agent-api-ingress
  namespace: multi-agent
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multi-agent-api
                port:
                  number: 8080
